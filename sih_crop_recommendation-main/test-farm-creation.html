<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Farm Creation</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .error { color: red; margin-top: 10px; }
        .success { color: green; margin-top: 10px; }
        .response { background: #f8f9fa; padding: 10px; border-radius: 4px; margin-top: 10px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Test Farm Creation API</h1>
    
    <div class="form-group">
        <label for="token">JWT Token:</label>
        <input type="text" id="token" placeholder="Enter your JWT token here">
    </div>

    <form id="farmForm">
        <div class="form-group">
            <label for="name">Farm Name:</label>
            <input type="text" id="name" value="Test Farm" required>
        </div>

        <div class="form-group">
            <label for="latitude">Latitude:</label>
            <input type="number" id="latitude" value="28.6139" step="any" required>
        </div>

        <div class="form-group">
            <label for="longitude">Longitude:</label>
            <input type="number" id="longitude" value="77.2090" step="any" required>
        </div>

        <div class="form-group">
            <label for="area">Area (optional):</label>
            <input type="number" id="area" value="5.5" step="any">
        </div>

        <div class="form-group">
            <label for="irrigationType">Irrigation Type (optional):</label>
            <select id="irrigationType">
                <option value="">Select...</option>
                <option value="drip">Drip</option>
                <option value="sprinkler">Sprinkler</option>
                <option value="flood">Flood</option>
                <option value="manual">Manual</option>
            </select>
        </div>

        <button type="submit">Create Farm</button>
    </form>

    <div id="result"></div>

    <script>
        document.getElementById('farmForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const resultDiv = document.getElementById('result');
            const token = document.getElementById('token').value;
            
            if (!token) {
                resultDiv.innerHTML = '<div class="error">Please enter your JWT token first</div>';
                return;
            }

            const farmData = {
                name: document.getElementById('name').value,
                geom: {
                    type: 'Polygon',
                    coordinates: [[
                        [parseFloat(document.getElementById('longitude').value), parseFloat(document.getElementById('latitude').value)],
                        [parseFloat(document.getElementById('longitude').value) + 0.001, parseFloat(document.getElementById('latitude').value)],
                        [parseFloat(document.getElementById('longitude').value) + 0.001, parseFloat(document.getElementById('latitude').value) + 0.001],
                        [parseFloat(document.getElementById('longitude').value), parseFloat(document.getElementById('latitude').value) + 0.001],
                        [parseFloat(document.getElementById('longitude').value), parseFloat(document.getElementById('latitude').value)]
                    ]]
                }
            };

            // Add optional fields
            const area = document.getElementById('area').value;
            if (area) farmData.area = parseFloat(area);
            
            const irrigationType = document.getElementById('irrigationType').value;
            if (irrigationType) farmData.irrigationType = irrigationType;

            console.log('Sending farm data:', farmData);

            try {
                const response = await fetch('https://sih-crop-recommendation.onrender.com/api/v1/farm', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(farmData)
                });

                const responseData = await response.text();
                let parsedData;
                try {
                    parsedData = JSON.parse(responseData);
                } catch {
                    parsedData = responseData;
                }

                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="success">Farm created successfully!</div>
                        <div class="response">${JSON.stringify(parsedData, null, 2)}</div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">Error ${response.status}: ${response.statusText}</div>
                        <div class="response">${JSON.stringify(parsedData, null, 2)}</div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">Network error: ${error.message}</div>
                `;
            }
        });
    </script>
</body>
</html>
